services:
  mysql:
    image: mysql:8.4
    container_name: linkdb-mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "3306:3306"

  backend:
    build:
      context: ../backend
    container_name: linkdb-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      CORS_ORIGIN: ${CORS_ORIGIN}
      JSON_BODY_LIMIT: ${JSON_BODY_LIMIT}
      LOGIN_RATE_LIMIT_WINDOW_MS: ${LOGIN_RATE_LIMIT_WINDOW_MS}
      LOGIN_RATE_LIMIT_MAX_REQUESTS: ${LOGIN_RATE_LIMIT_MAX_REQUESTS}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME}
      AUTH_TOKEN_TTL_DAYS: ${AUTH_TOKEN_TTL_DAYS}
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      args:
        VITE_API_BASE_URL: ""
    container_name: linkdb-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  mysql_data:
